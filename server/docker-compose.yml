services:
  mesh-server:
    build: .
    container_name: mesh-server
    ports:
      - "${HOST_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234}
      - LLM_MODEL=${LLM_MODEL:-qwen3-8b}
      - MESH_API_KEY=${MESH_API_KEY:-}
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mesh-cloudflared
    profiles:
      - tunnel
    depends_on:
      - mesh-server
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    volumes:
      - ./cloudflared-config.yml:/etc/cloudflared/config.yml:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    restart: unless-stopped
